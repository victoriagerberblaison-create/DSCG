<!DOCTYPE html>

<head>
<!-- Configuration chargée depuis config.json — NE PAS modifier ce bloc -->
<script>
  // Chargement synchrone bloquant de la config avant tout le reste
  // On utilise XMLHttpRequest synchrone car fetch() est async
  window.APP_CONFIG = null;
  (function() {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'config.json', false); // false = synchrone
      xhr.send(null);
      if (xhr.status === 200) {
        window.APP_CONFIG = JSON.parse(xhr.responseText);
      }
    } catch(e) {
      console.warn('config.json introuvable ou invalide — valeurs par défaut utilisées.', e);
    }
    // Raccourcis globaux
    var C = window.APP_CONFIG || {};
    window.CFG = {
      nom_app_global:      (C.app||{}).nom_app_global      || 'DSCG',
      kicker_global:       (C.app||{}).kicker_global       || 'Révisions',
      titre_court:        (C.app||{}).titre_court        || 'DEC UE1',
      kicker:             (C.app||{}).kicker             || 'DEC · UE 1',
      kicker_long:        (C.app||{}).kicker_long        || 'DEC · UE 1 · 16 sessions',
      titre_matiere_html: (C.app||{}).titre_matiere_html || 'Réglementation & <em>déontologie</em>',
      sous_titre_matiere: (C.app||{}).sous_titre_matiere || 'déontologie & réglementation',
      sous_titre_auth:    (C.app||{}).sous_titre_auth    || 'Flashcards de révision du programme',
      cache_prefix:       (C.app||{}).cache_prefix       || 'dec-ue1:',

      nb_questions_total: (C.contenu||{}).nb_questions_total || '600',
      description_premium:(C.contenu||{}).description_premium|| 'Des cartes supplémentaires couvrant l\'intégralité du programme.',
      description_app:    (C.contenu||{}).description_app    || '',
      description_a_propos: (C.contenu||{}).description_a_propos || 'Flashcards de cours conçues pour réviser efficacement le programme du DSCG.',

      accent:      (C.couleurs||{}).accent      || '#b5451e',
      accent_soft: (C.couleurs||{}).accent_soft || '#e8c5b1',

      premium_devise: (C.premium||{}).devise || '€',
      premium_paliers: (C.premium||{}).paliers || { '1': 4.99, '2': 8.99, '3': 12.99 },
      premium_pack: (C.premium||{}).pack_complet || { nb_ue: 7, prix: 24.99 },

      nom_societe: (C.societe||{}).nom     || 'DEC-ouverte',
      adresse:     (C.societe||{}).adresse || '12 rue de la Tuilerie, 67980 Hangenbieten',
      siren:       (C.societe||{}).siren   || 'en cours d\'immatriculation',
      email:       (C.societe||{}).email   || 'contact@dec-ouverte.fr',
      site_web:    (C.societe||{}).site_web || 'dec-ouverte.fr',
      annee:       (C.societe||{}).annee   || '2026',
      auteur:      (C.societe||{}).auteur  || 'VGB',

      supabase_url:      (C.technique||{}).supabase_url      || '',
      supabase_anon_key: (C.technique||{}).supabase_anon_key || '',
      google_analytics:  (C.technique||{}).google_analytics  || '',

      matieres: C.matieres || [],
      table_par_defaut: (C.app||{}).cache_prefix
        ? ((C.matieres && C.matieres[0]) ? C.matieres[0].table : 'flashcards')
        : 'flashcards'
    };
  })();

  // Google Analytics — chargé dynamiquement avec l'ID de la config
  if (window.CFG.google_analytics) {
    var _gaScript = document.createElement('script');
    _gaScript.async = true;
    _gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + window.CFG.google_analytics;
    document.head.appendChild(_gaScript);
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', window.CFG.google_analytics);
  }
</script>

<style>
/* La couleur --accent est écrasée dynamiquement par config.json via le script ci-dessous */

/* =============================================================
   RESET & BASE
   ============================================================= */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
button, input { font: inherit; color: inherit; }
button { border: 0; background: none; cursor: pointer; padding: 0; }
input { border: 0; background: none; outline: 0; }
ul { list-style: none; margin: 0; padding: 0; }

/* =============================================================
   TOKENS — palette éditoriale/papier
   ============================================================= */
:root {
  --bg:        #faf6f0;
  --bg-deep:   #f0ead9;
  --paper:     #fffdf7;
  --ink:       #1a1a1a;
  --ink-soft:  #5a4a3a;
  --ink-mute:  #8a7b68;
  --accent:      #b5451e;
  --accent-soft: #e8c5b1;
  --rule:      #d4c9b2;
  --rule-soft: #e8dec8;
  --ok:        #2d4a2f;
  --warn:      #b5451e;

  --font-display: "Iowan Old Style","Palatino Linotype","Palatino",Georgia,"Times New Roman",serif;
  --font-body:    -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-mono:    ui-monospace,"SF Mono",Menlo,Consolas,monospace;

  --radius-s: 4px;
  --radius-m: 10px;
  --radius-l: 18px;

  --touch: 48px;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  overflow-x: hidden;
  /* Grain texture subtle */
  background-image:
    radial-gradient(circle at 25% 15%, rgba(181,69,30,0.02) 0%, transparent 40%),
    radial-gradient(circle at 75% 80%, rgba(45,74,47,0.02) 0%, transparent 40%);
}

/* Conteneur central : mobile-first, max 430px */
#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background: var(--bg);
  /* Faux bords de feuillet sur desktop */
  box-shadow: 0 0 0 1px var(--rule-soft);
}
@media (min-width: 431px) {
  body { padding: 24px 0; }
  #app { min-height: calc(100vh - 48px); border-radius: var(--radius-l); overflow: hidden; }
}

/* =============================================================
   COMPOSANTS COMMUNS
   ============================================================= */

/* Bande d'entête minimaliste */
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--rule-soft);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 56px;
  backdrop-filter: saturate(180%) blur(10px);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  background: rgba(250,246,240,0.92);
}
.topbar .kicker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.topbar .title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.icon-btn {
  width: var(--touch);
  height: var(--touch);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--ink);
  font-size: 20px;
  flex-shrink: 0;
  margin: -4px;
}
.icon-btn:active { background: var(--rule-soft); }
.icon-btn svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* Texte du contenu */
h1, h2, h3 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.015em; margin: 0; color: var(--ink); }

h2 { font-size: 24px; line-height: 1.2; }
h3 { font-size: 18px; line-height: 1.3; }
p  { margin: 0 0 1em; }

.kicker {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: var(--touch);
  padding: 0 22px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.01em;
  border-radius: var(--radius-m);

}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.secondary { background: var(--paper); color: var(--ink); border: 1px solid var(--rule); }
.btn.secondary:active { background: var(--rule-soft); }

.btn.ghost:active { background: var(--rule-soft); }
.btn.danger { background: transparent; color: var(--accent); border: 1px solid var(--accent-soft); }

/* =============================================================
   VUE : CARTE (FLASHCARD)
   ============================================================= */
.screen-card {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}
.card-topbar {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 56px;
  background: var(--bg);
  border-bottom: 1px solid var(--rule-soft);
}
.card-counter {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.08em;
  text-align: center;
}
.card-counter .sep { margin: 0 4px; color: var(--rule); }

.card-progressbar {
  height: 2px;
  background: var(--rule-soft);
  position: relative;
}
.card-progressbar > span {
  position: absolute; inset: 0 auto 0 0;
  background: var(--accent);
  transition: width 0.3s;
}

.card-stage {
  flex: 1;
  padding: 20px 20px 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  perspective: 1400px;
}

.flashcard {
  position: relative;
  width: 100%;
  max-width: 380px;
  margin: 0 auto;
  aspect-ratio: 3 / 4.4;
  min-height: 440px;
  max-height: calc(100vh - 220px);
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.flashcard.flipped { transform: rotateY(180deg); }

.flashcard-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 18px;
  padding: 24px 22px 22px;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 1px 0 var(--rule-soft),
    0 10px 40px -12px rgba(26,26,26,0.08),
    0 2px 8px -4px rgba(26,26,26,0.04);
  overflow: hidden;
}
.flashcard-face.back { transform: rotateY(180deg); }
.flashcard-face.back::before,
.flashcard-face.front::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.flashcard-face.back::before,
.flashcard-face.front::before { background: var(--accent); }

.fc-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 20px;
  padding-top: 4px;
}
.fc-theme {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  line-height: 1.3;
  max-width: 220px;
}
.fc-theme .part {
  display: inline-block;
  font-weight: 600;
  color: var(--ink);
  margin-right: 6px;
}
.fc-theme .part { color: var(--accent); }
.fc-id {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  flex-shrink: 0;
}

.fc-question {
  font-family: var(--font-display);
  font-size: 23px;
  line-height: 1.25;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: auto;
  overflow-y: auto;
  padding-right: 2px;
}

.fc-answer {
  font-family: var(--font-body);
  font-size: 15.5px;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 14px;
  overflow-y: auto;
  padding-right: 2px;
  flex: 1;
  min-height: 0;
}

.fc-detail {
  background: var(--bg-deep);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 14px;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--ink-soft);
}
.fc-detail-toggle {
  background: transparent;
  color: var(--ink-soft);
  font-size: 12px;
  padding: 6px 0;
  margin-bottom: 8px;
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: left;
  text-decoration: underline;
  text-decoration-color: var(--rule);
  text-underline-offset: 3px;
}

.fc-source {
  font-size: 12px;
  color: var(--ink-mute);
  font-style: italic;
  border-top: 1px dotted var(--rule);
  padding-top: 10px;
  margin-bottom: 8px;
  line-height: 1.4;
}

.fc-footer-front {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding-top: 16px;
  color: var(--ink-mute);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.fc-footer-front::before,
.fc-footer-front::after {
  content: "";
  flex: 1;
  max-width: 80px;
  height: 1px;
  background: var(--rule);
}

.fc-occurrences {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.08em;
}

/* Card actions */
.card-actions {
  padding: 12px 20px 28px;
  padding-bottom: max(28px, env(safe-area-inset-bottom));
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  background: var(--bg);
  border-top: 1px solid var(--rule-soft);
}
.card-actions .full {
  grid-column: 1 / -1;
}
.card-action {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 52px;
  border-radius: var(--radius-m);
  font-size: 14px;
  font-weight: 500;
  padding: 0 12px;
  transition: transform 0.08s;
}
.card-action:active { transform: scale(0.98); }
.card-action.review {
  background: var(--paper);
  border: 1.5px solid var(--warn);
  color: var(--warn);
}
.card-action.mastered {
  background: var(--ok);
  color: var(--bg);
}
.card-action.skip {
  background: var(--paper);
  border: 1px solid var(--rule);
  color: var(--ink-soft);
  min-height: 44px;
  font-size: 13px;
}

.card-state-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 3px;
  background: var(--bg-deep);
  color: var(--ink-mute);
  z-index: 2;
}
.card-state-badge.mastered { background: var(--ok); color: var(--bg); }
.card-state-badge.review { background: var(--warn); color: var(--bg); }

/* Écran premium-info */
.screen-premium { max-width: 430px; margin: 0 auto; padding: 0 0 60px; }
.premium-hero { padding: 48px 28px 32px; text-align: center; border-bottom: 1px solid var(--rule-soft); }
.premium-hero .icon { font-size: 36px; margin-bottom: 16px; }
.premium-hero h2 { font-family: var(--font-display); font-size: 24px; margin: 0 0 10px; }
.premium-hero .sub { font-size: 14px; color: var(--ink-soft); line-height: 1.55; }
.premium-features { padding: 28px 28px 0; }
.premium-features .feat-row {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid var(--rule-soft);
  font-size: 14px; line-height: 1.5; color: var(--ink-soft);
}
.premium-features .feat-row:last-child { border-bottom: none; }
.premium-features .feat-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.premium-features .feat-text strong { display: block; color: var(--ink); margin-bottom: 2px; font-size: 14px; }
.premium-price-block {
  margin: 28px 28px 0; padding: 20px;
  background: var(--bg-deep); border-radius: var(--radius-m); text-align: center;
}
.premium-price-block .price { font-family: var(--font-display); font-size: 32px; color: var(--ink); }
.premium-price-block .price-sub { font-size: 12px; color: var(--ink-mute); margin-top: 4px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
.premium-cta { padding: 20px 28px 0; }
.premium-legal { padding: 16px 28px 0; font-size: 11px; color: var(--ink-mute); text-align: center; line-height: 1.6; }

/* Empty state */
.empty-state {
  padding: 60px 30px;
  text-align: center;
  color: var(--ink-soft);
}
.empty-state h2 {
  margin-bottom: 12px;
}
.empty-state p { margin-bottom: 24px; font-size: 14px; line-height: 1.55; }

/* =============================================================
   VUE : FILTRE THÈMES (modal)
   ============================================================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.5);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal.open { opacity: 1; pointer-events: auto; }
.modal-sheet {
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 430px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: env(safe-area-inset-bottom);
}
.modal.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--rule);
  border-radius: 2px;
  margin: 10px auto 0;
}
.modal-head {
  padding: 18px 24px 10px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.modal-head h2 { font-size: 20px; }
.modal-head .actions {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
}
.modal-head .actions button {
  color: var(--accent);
  padding: 8px;
  margin: -8px;
  font-family: inherit;
  font-size: inherit;
  font-weight: 500;
}
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 4px 24px 20px;
  -webkit-overflow-scrolling: touch;
}
.modal-part {
  margin-bottom: 24px;
}
.modal-part .part-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-part .part-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: currentColor;
  opacity: 0.3;
}
.theme-check {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 4px;
  width: 100%;
  text-align: left;
  border-bottom: 1px dotted var(--rule);
  min-height: 52px;
}
.theme-check:last-child { border-bottom: 0; }
.theme-check .checkbox {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  border: 1.5px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: var(--bg);
  transition: all 0.15s;
}
.theme-check.checked .checkbox {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.theme-check .checkbox svg {
  width: 14px; height: 14px;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
  opacity: 0;
}
.theme-check.checked .checkbox svg { opacity: 1; }
.theme-check .body { flex: 1; min-width: 0; }
.theme-check .name {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.35;
}
.theme-check .meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  margin-top: 2px;
}
.modal-foot {
  padding: 14px 24px 20px;
  border-top: 1px solid var(--rule-soft);
  background: var(--bg);
}

/* =============================================================
   TOAST / MILESTONE CELEBRATION
   ============================================================= */
.toast-container {
  position: fixed;
  bottom: calc(100px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  pointer-events: none;
  width: calc(100% - 40px);
  max-width: 360px;
}
.toast {
  background: var(--ink);
  color: var(--bg);
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  box-shadow: 0 8px 32px -8px rgba(26,26,26,0.3);
  margin-bottom: 8px;
  animation: toast-in 0.3s ease, toast-out 0.3s ease 2.4s forwards;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast .tkicker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(250,246,240,0.7);
  display: block;
  margin-bottom: 2px;
}
.toast.milestone { background: var(--accent); }
.toast.milestone .tkicker { color: rgba(250,246,240,0.85); }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-8px); }
}

/* =============================================================
   SETTINGS
   ============================================================= */
.settings-list {
  padding: 0;
  margin: 0;
}
.settings-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 24px;
  border-bottom: 1px solid var(--rule-soft);
  width: 100%;
  text-align: left;
  min-height: 64px;
  background: var(--bg);
}
.settings-row:active { background: var(--bg-deep); }
.settings-row .s-label {
  flex: 1;
  font-size: 15px;
  color: var(--ink);
}
.settings-row.danger .s-label { color: var(--accent); }
.settings-row .s-meta {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-mute);
}

/* Utilitaires */
.hidden { display: none !important; }
.visually-hidden {
  position: absolute; width: 1px; height: 1px;
  margin: -1px; padding: 0; overflow: hidden;
  clip: rect(0,0,0,0); border: 0;
}

/* Scrollbar discrète */
*::-webkit-scrollbar { width: 6px; height: 6px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


/* =============================================================
   V2 ADDITIONS — Écrans auth & indicateur sync
   ============================================================= */

/* --- Écran AUTH (signin / signup / reset) --- */
.screen-auth {
  padding: 48px 28px 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.screen-auth .masthead {
  margin-bottom: 40px;
}
.screen-auth .masthead .kicker {
  margin-bottom: 14px;
}
.screen-auth .masthead h1 {
  font-size: 42px;
  line-height: 1.02;
  margin-bottom: 16px;
}
.screen-auth .masthead h1 em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.screen-auth .masthead p {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.55;
  max-width: 34ch;
}

.auth-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 28px;
}
.auth-tab {
  flex: 1;
  padding: 14px 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.auth-tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}

.auth-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.auth-form .field label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.auth-form input[type="email"],
.auth-form input[type="password"],
.auth-form input[type="text"] {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius-m);
  padding: 14px 16px;
  font-size: 16px;
  color: var(--ink);
  min-height: var(--touch);
  font-family: var(--font-body);
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}
.auth-form input:focus {
  border-color: var(--ink);
  outline: none;
}
.auth-form .forgot {
  align-self: flex-end;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-soft);
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 4px;
  margin: -4px;
  letter-spacing: 0.06em;
}
.auth-form .submit {
  margin-top: 10px;
}
.auth-form .error-msg {
  font-size: 13px;
  color: var(--accent);
  background: rgba(181, 69, 30, 0.06);
  border-left: 2px solid var(--accent);
  padding: 10px 14px;
  border-radius: 0 var(--radius-s) var(--radius-s) 0;
  line-height: 1.45;
}
.auth-form .info-msg {
  font-size: 13px;
  color: var(--ink-soft);
  background: var(--bg-deep);
  border-left: 2px solid var(--ok);
  padding: 10px 14px;
  border-radius: 0 var(--radius-s) var(--radius-s) 0;
  line-height: 1.45;
}

.screen-auth .disclaimer {
  margin-top: auto;
  padding-top: 40px;
  font-size: 12px;
  color: var(--ink-mute);
  line-height: 1.55;
}

/* --- État "vérifier email" après signup --- */
.screen-verify {
  padding: 64px 28px 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  text-align: left;
}
.screen-verify .kicker { margin-bottom: 14px; }
.screen-verify h1 {
  font-size: 36px;
  line-height: 1.05;
  margin-bottom: 20px;
}
.screen-verify p {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.55;
  margin-bottom: 16px;
}
.screen-verify .email-echo {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--bg-deep);
  padding: 10px 14px;
  border-radius: var(--radius-s);
  color: var(--ink);
  word-break: break-all;
  margin-bottom: 28px;
  display: inline-block;
}
.screen-verify .actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: auto;
}

/* --- Indicateur de synchronisation --- */
.sync-indicator {
  position: fixed;
  bottom: calc(16px + env(safe-area-inset-bottom));
  right: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 100px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 500;
  box-shadow: 0 8px 24px -8px rgba(26,26,26,0.3);
}
.sync-indicator.visible {
  opacity: 1;
  transform: translateY(0);
}
.sync-indicator .sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--bg);
  opacity: 0.9;
}
.sync-indicator.syncing .sync-dot {
  animation: sync-pulse 1s infinite ease-in-out;
}
.sync-indicator.offline {
  background: #8a7b68;
}
.sync-indicator.error {
  background: var(--accent);
}
@keyframes sync-pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.9); }
  50% { opacity: 1; transform: scale(1.15); }
}

/* --- Splash de chargement initial --- */
.splash {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  gap: 20px;
}
.splash .splash-kicker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.splash .splash-title {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.splash .splash-title em {
  font-style: italic;
  color: var(--accent);
}
.splash .splash-sub {
  font-size: 13px;
  color: var(--ink-soft);
}
.splash-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: splash-pulse 1.2s infinite ease-in-out;
}
@keyframes splash-pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}
.splash.hidden {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* Account info dans la topbar */
.topbar .account-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  line-height: 1.15;
  overflow: hidden;
}
.topbar .account-info .acct-pseudo {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.topbar .account-info .acct-email {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

/* --- Dialog inline générique (pour changer pseudo, etc) --- */
.inline-dialog {
  padding: 24px;
  background: var(--bg);
}
.inline-dialog h2 { font-size: 22px; margin-bottom: 8px; }
.inline-dialog p {
  font-size: 14px;
  color: var(--ink-soft);
  margin-bottom: 20px;
  line-height: 1.5;
}
.inline-dialog .field input { margin-top: 6px; }
.inline-dialog .actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.inline-dialog .actions .btn { flex: 1; }


/* ============================================================
   CARROUSEL INFO DU JOUR
   ============================================================ */
.carousel-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(26,26,26,0.55);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
.carousel-overlay.visible { opacity: 1; pointer-events: auto; }
.carousel-sheet {
  background: var(--paper);
  border-radius: var(--radius-l) var(--radius-l) 0 0;
  width: 100%; max-width: 430px; padding: 0 0 24px;
  box-shadow: 0 -4px 32px rgba(26,26,26,0.18);
  transform: translateY(100%);
  transition: transform 0.36s cubic-bezier(0.32,0.72,0,1);
  position: relative; overflow: hidden;
}
.carousel-overlay.visible .carousel-sheet { transform: translateY(0); }
.carousel-handle { width:36px; height:4px; background:var(--rule); border-radius:2px; margin:12px auto 0; }
.carousel-close {
  position:absolute; top:8px; right:8px; width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; color:var(--ink-mute); cursor:pointer; transition:background 0.15s;
}
.carousel-close:active { background:var(--rule-soft); }
.carousel-kicker {
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--accent); text-align:center; margin:18px 0 0;
}
.carousel-track-wrapper { overflow:hidden; margin-top:4px; }
.carousel-track { display:flex; transition:transform 0.32s cubic-bezier(0.4,0,0.2,1); }
.carousel-slide { min-width:100%; padding:16px 28px 8px; box-sizing:border-box; }
.carousel-slide-text { font-family:var(--font-body); font-size:15px; line-height:1.65; color:var(--ink); min-height:120px; }
.carousel-p { display:block; margin:0 0 0.85em; }
.carousel-p:last-child { margin-bottom:0; }
.carousel-dots { display:flex; justify-content:center; gap:6px; margin:14px 0 0; }
.carousel-dot { width:6px; height:6px; border-radius:50%; background:var(--rule); transition:background 0.2s,transform 0.2s; cursor:pointer; }
.carousel-dot.active { background:var(--accent); transform:scale(1.25); }
.carousel-footer { display:flex; justify-content:space-between; align-items:center; padding:14px 28px 0; }
.carousel-btn-skip { font-size:14px; color:var(--ink-mute); cursor:pointer; padding:8px 4px; }
.carousel-btn-next {
  display:inline-flex; align-items:center; min-height:44px; padding:0 22px;
  font-size:14px; font-weight:500; border-radius:var(--radius-m);
  background:var(--accent); color:var(--bg); cursor:pointer; border:none; transition:transform 0.1s;
}
.carousel-btn-next:active { transform:scale(0.97); }
</style>
<script>
// Appliquer la couleur d'accent depuis config.json
(function() {
  if (!window.CFG) return;
  var root = document.documentElement;
  root.style.setProperty('--accent',      window.CFG.accent);
  root.style.setProperty('--accent-soft', window.CFG.accent_soft);
})();
</script>

<!-- =============================================================
     DONNÉES DES CARTES
     ============================================================= -->
<script id="cards-data">
/* THEMES est désormais chargé depuis config.json (matieres[].themes) */
let THEMES = {};

let CARDS = []; // Chargées depuis Supabase au démarrage — voir loadCards();

</script>

<!-- =============================================================
     LOGIQUE DE L'APPLICATION
     ============================================================= -->
<script id="app-logic">

(function() {
'use strict';

// ============================================================
// CONFIG SUPABASE — lue depuis config.json via window.CFG
// ============================================================
// Ces valeurs sont injectées dynamiquement depuis config.json.
// Pour changer de matière, modifiez uniquement config.json.
const SUPABASE_URL = window.CFG.supabase_url;
const SUPABASE_ANON_KEY = window.CFG.supabase_anon_key;

// Cache local (localStorage) — clés
const CACHE_PREFIX = window.CFG.cache_prefix;
const CACHE_USER_KEY = CACHE_PREFIX + 'user';
const CACHE_PROFILE_KEY = CACHE_PREFIX + 'profile';
const CACHE_PROGRESS_KEY = CACHE_PREFIX + 'progress';
const CACHE_PREMIUM_KEY = CACHE_PREFIX + 'premium';
const CACHE_QUEUE_KEY = CACHE_PREFIX + 'queue';

// Instance Supabase
let supabase = null;
try {
  if (window.supabase && typeof window.supabase.createClient === 'function') {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });
  }
} catch (err) {
  console.error('Supabase init failed', err);
}

// ============================================================
// ÉTAT DE L'APPLICATION
// ============================================================
const State = {
  user: null,            // { id, email }
  profile: null,         // { pseudo, streak*, totalSeen, milestonesReached, honestNoteShown, updatedAt }
  progress: {},          // { [cardId]: { status, seenCount, lastSeenAt } }

  // UI state
  view: 'splash',        // 'splash' | 'auth' | 'verify' | 'home' | 'card' | 'settings'
  authMode: 'signin',    // 'signin' | 'signup' | 'reset'
  authError: null,
  authInfo: null,
  pendingEmail: null,    // pour l'écran "vérifie ton email"

  session: null,         // { cards: [], index: 0, label: '...' }
  filter: null,
  cardFlipped: false,
  lastDetailOpen: false,

  // Sync state
  isOnline: navigator.onLine,
  syncQueue: [],         // [{ type, cardId, data }, ...]
  syncInProgress: false,
  lastSyncAt: null,
  pendingWrites: 0,

  // Matière sélectionnée (UE) — objet de window.CFG.matieres, ou null si aucune config
  matiere: null,

  // Ensemble des ids de matières (UE) pour lesquelles l'utilisateur a un
  // accès premium actif (ex: Set {'ue1', 'ue3'}). Chargé depuis Supabase
  // à la connexion.
  premiumAccess: new Set()
};

// Clé de cache pour la matière sélectionnée
const CACHE_MATIERE_KEY = CACHE_PREFIX + 'matiere';

// Pour compat avec la logique métier existante (calculs de stats)
// On fabrique un objet profileData "simulé" qui présente progress, streak, etc.
Object.defineProperty(State, 'profileData', {
  get() {
    if (!State.profile) return null;
    return {
      progress: State.progress,
      streak: {
        current: State.profile.streak_current || 0,
        longest: State.profile.streak_longest || 0,
        lastDay: State.profile.streak_last_day || null
      },
      stats: {
        totalSeen: State.profile.total_seen || 0,
        milestonesReached: State.profile.milestones_reached || []
      },
      flags: {
        honestNoteShown: !!State.profile.honest_note_shown
      }
    };
  }
});

// ============================================================
// CACHE LOCAL (localStorage)
// ============================================================
const Cache = {
  saveUser(user) {
    try {
      if (user) {
        localStorage.setItem(CACHE_USER_KEY, JSON.stringify({ id: user.id, email: user.email }));
      } else {
        localStorage.removeItem(CACHE_USER_KEY);
      }
    } catch (e) { /* ignore quota / private mode */ }
  },
  loadUser() {
    try {
      const raw = localStorage.getItem(CACHE_USER_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  saveProfile(profile) {
    try {
      localStorage.setItem(CACHE_PROFILE_KEY, JSON.stringify(profile));
    } catch (e) {}
  },
  loadProfile() {
    try {
      const raw = localStorage.getItem(CACHE_PROFILE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  saveProgress(progress) {
    try {
      localStorage.setItem(CACHE_PROGRESS_KEY, JSON.stringify(progress));
    } catch (e) {}
  },
  loadProgress() {
    try {
      const raw = localStorage.getItem(CACHE_PROGRESS_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  },
  saveQueue(queue) {
    try {
      localStorage.setItem(CACHE_QUEUE_KEY, JSON.stringify(queue));
    } catch (e) {}
  },
  loadQueue() {
    try {
      const raw = localStorage.getItem(CACHE_QUEUE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  },
  savePremiumAccess(set) {
    try {
      localStorage.setItem(CACHE_PREMIUM_KEY, JSON.stringify(Array.from(set || [])));
    } catch (e) {}
  },
  loadPremiumAccess() {
    try {
      const raw = localStorage.getItem(CACHE_PREMIUM_KEY);
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch (e) { return new Set(); }
  },
  clearAll() {
    try {
      localStorage.removeItem(CACHE_USER_KEY);
      localStorage.removeItem(CACHE_PROFILE_KEY);
      localStorage.removeItem(CACHE_PROGRESS_KEY);
      localStorage.removeItem(CACHE_QUEUE_KEY);
      localStorage.removeItem(CACHE_PREMIUM_KEY);
    } catch (e) {}
  }
};

// ============================================================
// SYNC QUEUE — file d'attente pour modifications offline
// ============================================================
//
// Une "op" peut être :
//   { t: 'card', cardId, status, seenCount, lastSeenAt }   → upsert card_progress
//   { t: 'profile', fields: {...} }                         → update profiles
//
// La queue est persistée. On coalesce : plusieurs ops sur la même
// carte = une seule op avec l'état final. Idem pour 'profile'.
//
// Gestion des pannes : backoff exponentiel (600ms, 1.2s, 2.4s...
// plafonné à 30s). Au bout de 3 échecs consécutifs, un toast
// informe l'utilisateur. Les ops restent en queue, protégées dans
// localStorage, et sont retentées automatiquement.

// État du backoff (hors de l'objet SyncQueue pour pouvoir reset depuis l'extérieur)
let syncFailureCount = 0;
let syncWarningShown = false;
const SYNC_BACKOFF_BASE = 600;        // 600 ms
const SYNC_BACKOFF_MAX = 30000;       // 30 s
const SYNC_WARNING_THRESHOLD = 3;     // avertir après 3 échecs consécutifs

function computeBackoffDelay() {
  // 0 → 600ms, 1 → 1.2s, 2 → 2.4s, 3 → 4.8s, 4 → 9.6s, 5 → 19.2s, 6+ → 30s
  const exp = Math.min(syncFailureCount, 6);
  return Math.min(SYNC_BACKOFF_BASE * Math.pow(2, exp), SYNC_BACKOFF_MAX);
}

const SyncQueue = {
  enqueueCard(cardId) {
    const p = State.progress[cardId];
    if (!p) return;
    // Retire les ops existantes sur cette carte (coalesce)
    State.syncQueue = State.syncQueue.filter(op => !(op.t === 'card' && op.cardId === cardId));
    State.syncQueue.push({
      t: 'card',
      cardId: cardId,
      status: p.status,
      seenCount: p.seenCount || 0,
      lastSeenAt: p.lastSeenAt || null
    });
    Cache.saveQueue(State.syncQueue);
    State.pendingWrites = State.syncQueue.length;
    renderSyncIndicator();
    scheduleFlush();
  },

  enqueueProfile() {
    if (!State.profile) return;
    // Coalesce : une seule op profile
    State.syncQueue = State.syncQueue.filter(op => op.t !== 'profile');
    State.syncQueue.push({
      t: 'profile',
      fields: {
        pseudo: State.profile.pseudo,
        total_seen: State.profile.total_seen,
        streak_current: State.profile.streak_current,
        streak_longest: State.profile.streak_longest,
        streak_last_day: State.profile.streak_last_day,
        milestones_reached: State.profile.milestones_reached,
        honest_note_shown: State.profile.honest_note_shown
      }
    });
    Cache.saveQueue(State.syncQueue);
    State.pendingWrites = State.syncQueue.length;
    renderSyncIndicator();
    scheduleFlush();
  },

  // Appelé quand l'utilisateur force une action (ex. retour en ligne) :
  // on remet à zéro le compteur d'échecs pour réessayer immédiatement.
  resetBackoff() {
    syncFailureCount = 0;
    syncWarningShown = false;
  },

  async flush() {
    if (State.syncInProgress) return;
    if (!State.isOnline) return;
    if (!State.user || !supabase) return;
    if (State.syncQueue.length === 0) return;

    State.syncInProgress = true;
    renderSyncIndicator();

    // On copie la queue actuelle et on la vide. Si une op échoue, on la
    // remet en tête pour retry. Les nouvelles ops arrivées entre-temps
    // s'ajoutent derrière.
    const toProcess = State.syncQueue.slice();
    State.syncQueue = [];
    Cache.saveQueue(State.syncQueue);

    const failed = [];
    let sawTransientError = false;

    for (const op of toProcess) {
      try {
        if (op.t === 'card') {
          const { error } = await supabase
            .from('card_progress')
            .upsert({
              user_id: State.user.id,
              card_id: op.cardId,
              status: op.status,
              seen_count: op.seenCount,
              last_seen_at: op.lastSeenAt
            });
          if (error) throw error;
        } else if (op.t === 'profile') {
          const { error } = await supabase
            .from('profiles')
            .update(op.fields)
            .eq('user_id', State.user.id);
          if (error) throw error;
        }
      } catch (err) {
        console.warn('sync op failed', op, err);
        failed.push(op);
        // Heuristique : erreur réseau / 5xx / auth = transitoire
        // erreur 4xx ciblée (data invalide) = permanente
        const msg = (err && err.message) ? err.message.toLowerCase() : '';
        const status = err && err.status;
        const isTransient =
          !status ||
          status >= 500 ||
          status === 401 ||   // token expiré, retry après refresh auto
          status === 408 ||   // timeout
          status === 429 ||   // rate limit
          msg.includes('fetch') ||
          msg.includes('network') ||
          msg.includes('timeout') ||
          msg.includes('connection');
        if (isTransient) sawTransientError = true;
      }
    }

    // Remet les échecs en tête
    if (failed.length) {
      State.syncQueue = failed.concat(State.syncQueue);
      Cache.saveQueue(State.syncQueue);
      State.pendingWrites = State.syncQueue.length;

      if (sawTransientError) {
        syncFailureCount++;
        // Avant : on affichait un toast après 3 échecs. Désormais, sync silencieuse :
        // les ops restent en queue, persistées dans localStorage,
        // l'utilisateur n'est pas dérangé.
        if (syncFailureCount >= SYNC_WARNING_THRESHOLD && !syncWarningShown) {
          syncWarningShown = true;
        }
      }
    } else {
      // Tout est passé : on repart du bon pied
      State.lastSyncAt = Date.now();
      State.pendingWrites = State.syncQueue.length;
      if (syncFailureCount > 0) {
        // On récupère d'une période d'échec, silencieusement
        syncFailureCount = 0;
        syncWarningShown = false;
      }
    }

    State.syncInProgress = false;
    renderSyncIndicator();

    // Si des nouvelles ops sont arrivées ou si on a des échecs à retenter :
    // replanifier, avec délai augmenté en cas d'échec
    if (State.syncQueue.length > 0 && State.isOnline) {
      const delay = failed.length > 0 ? computeBackoffDelay() : 600;
      setTimeout(() => SyncQueue.flush(), delay);
    }
  }
};

let flushTimer = null;
function scheduleFlush() {
  if (flushTimer) clearTimeout(flushTimer);
  flushTimer = setTimeout(() => {
    flushTimer = null;
    SyncQueue.flush();
  }, 400); // débounce : on laisse quelques marquages rapides s'accumuler
}

// ============================================================
// BACKEND — appels Supabase haut niveau
// ============================================================
const Backend = {

  isReady() {
    return !!supabase;
  },

  async getSession() {
    if (!supabase) return null;
    try {
      const { data } = await supabase.auth.getSession();
      return data?.session || null;
    } catch (e) { return null; }
  },

  async signUp(email, password) {
    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password,
      options: {
        emailRedirectTo: window.location.origin + window.location.pathname
      }
    });
    if (error) throw error;
    return data;
  },

  async signIn(email, password) {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });
    if (error) throw error;
    return data;
  },

  async signOut() {
    await supabase.auth.signOut();
  },

  async resetPassword(email) {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname
    });
    if (error) throw error;
  },

  async updatePassword(newPassword) {
    const { error } = await supabase.auth.updateUser({ password: newPassword });
    if (error) throw error;
  },

  async loadProfile(userId) {
    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('user_id', userId)
      .single();
    if (error) throw error;
    return data;
  },

  async loadProgress(userId) {
    const { data, error } = await supabase
      .from('card_progress')
      .select('card_id, status, seen_count, last_seen_at')
      .eq('user_id', userId);
    if (error) throw error;
    return data || [];
  },

  // Retourne l'ensemble des matières (UE) pour lesquelles l'utilisateur
  // a un accès premium actif (non expiré).
  async loadPremiumAccess(userId) {
    const { data, error } = await supabase
      .from('premium_access')
      .select('matiere_id, expires_at')
      .eq('user_id', userId);
    if (error) throw error;
    const now = new Date();
    const active = new Set();
    for (const row of (data || [])) {
      if (!row.expires_at || new Date(row.expires_at) > now) {
        active.add(row.matiere_id);
      }
    }
    return active;
  },

  async deleteAllProgress(userId) {
    const { error } = await supabase
      .from('card_progress')
      .delete()
      .eq('user_id', userId);
    if (error) throw error;
  }
};

// ============================================================
// HELPERS CARTES / PROGRESSION
// ============================================================

function getCard(id) { return CARDS.find(c => c.id === id); }

function getCardStatus(cardId) {
  const p = State.progress[cardId];
  return p ? p.status : null;
}

function setCardStatus(cardId, status) {
  if (!State.progress[cardId]) {
    State.progress[cardId] = { status: null, seenCount: 0, lastSeenAt: null };
  }
  State.progress[cardId].status = status;
  State.progress[cardId].lastSeenAt = new Date().toISOString();
  Cache.saveProgress(State.progress);
  SyncQueue.enqueueCard(cardId);
}

function markCardSeen(cardId) {
  if (!State.progress[cardId]) {
    State.progress[cardId] = { status: null, seenCount: 0, lastSeenAt: null };
  }
  const wasUnseen = !State.progress[cardId].seenCount;
  State.progress[cardId].seenCount += 1;
  State.progress[cardId].lastSeenAt = new Date().toISOString();
  Cache.saveProgress(State.progress);

  let profileChanged = false;

  if (wasUnseen) {
    State.profile.total_seen = (State.profile.total_seen || 0) + 1;
    profileChanged = true;
    checkMilestones(State.profile.total_seen);
  }

  if (updateStreak()) profileChanged = true;

  if (profileChanged) {
    Cache.saveProfile(State.profile);
    SyncQueue.enqueueProfile();
  }
  SyncQueue.enqueueCard(cardId);
}

function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const last = State.profile.streak_last_day;
  if (last === today) return false;

  if (last) {
    const prev = new Date(last + 'T00:00:00');
    const now = new Date(today + 'T00:00:00');
    const diff = Math.round((now - prev) / (1000 * 60 * 60 * 24));
    if (diff === 1) {
      State.profile.streak_current = (State.profile.streak_current || 0) + 1;
    } else if (diff > 1) {
      State.profile.streak_current = 1;
    }
  } else {
    State.profile.streak_current = 1;
  }
  State.profile.streak_last_day = today;
  if ((State.profile.streak_current || 0) > (State.profile.streak_longest || 0)) {
    State.profile.streak_longest = State.profile.streak_current;
  }
  return true;
}

const MILESTONES = [10, 25, 50, 100, 150, 200];
function checkMilestones(total) {
  const reached = State.profile.milestones_reached || [];
  let added = false;
  for (const m of MILESTONES) {
    if (total >= m && !reached.includes(m)) {
      reached.push(m);
      added = true;
      showMilestone(m);
    }
  }
  if (added) State.profile.milestones_reached = reached;
}

// ============================================================
// STATS GLOBALES
// ============================================================

function totalCards() { return CARDS.length; }

// Cartes accessibles à l'utilisateur pour la matière actuelle : toutes les
// cartes gratuites, plus les cartes premium si l'UE est débloquée.
function availableCards() {
  if (isCurrentMatierePremium()) return CARDS;
  return CARDS.filter(c => !c.isPremium);
}

// Nombre de cartes premium verrouillées (non incluses dans availableCards)
function lockedPremiumCount() {
  if (isCurrentMatierePremium()) return 0;
  return CARDS.filter(c => c.isPremium).length;
}

function masteredCount(filterFn) {
  let n = 0;
  for (const c of availableCards()) {
    if (filterFn && !filterFn(c)) continue;
    if (getCardStatus(c.id) === 'mastered') n++;
  }
  return n;
}

function seenCount(filterFn) {
  let n = 0;
  for (const c of availableCards()) {
    if (filterFn && !filterFn(c)) continue;
    const p = State.progress[c.id];
    if (p && p.seenCount > 0) n++;
  }
  return n;
}

function themeStats(themeKey) {
  const inTheme = availableCards().filter(c => c.theme === themeKey);
  const mastered = inTheme.filter(c => getCardStatus(c.id) === 'mastered').length;
  return { total: inTheme.length, mastered };
}

// ============================================================
// MODES DE RÉVISION
// ============================================================

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSession(cards, label) {
  if (!cards || cards.length === 0) {
    toast('Aucune carte à réviser avec ces critères.', 'info');
    return;
  }
  State.session = { cards: cards, index: 0, label: label || 'Révision' };
  State.cardFlipped = false;
  State.lastDetailOpen = false;
  render('card');
}

function modeSmartReview() {
  const toReview = [], unseen = [], mastered = [];
  for (const c of availableCards()) {
    const p = State.progress[c.id];
    if (p && p.status === 'review') toReview.push(c);
    else if (!p || !p.seenCount) unseen.push(c);
    else if (p.status !== 'mastered') unseen.push(c);
    else mastered.push(c);
  }

  // Échauffement : jusqu'à 3 cartes maîtrisées
  const warmup = shuffle(mastered).slice(0, 3);

  // Objectif : 5 à revoir + 5 non vues
  // Si manque de l'un, on complète avec l'autre, puis avec des maîtrisées
  const shuffledReview = shuffle(toReview);
  const shuffledUnseen = shuffle(unseen);
  const shuffledMastered = shuffle(mastered);

  let reviewPick = shuffledReview.slice(0, 5);
  let unseenPick = shuffledUnseen.slice(0, 5);

  // Compléter les manques entre review et unseen
  const reviewShortfall = 5 - reviewPick.length;
  const unseenShortfall = 5 - unseenPick.length;

  if (reviewShortfall > 0) {
    // Pas assez de "à revoir" → compléter avec des non vues supplémentaires
    const extra = shuffledUnseen.slice(5, 5 + reviewShortfall);
    reviewPick = [...reviewPick, ...extra];
  }
  if (unseenShortfall > 0) {
    // Pas assez de "non vues" → compléter avec des "à revoir" supplémentaires
    const extra = shuffledReview.slice(5, 5 + unseenShortfall);
    unseenPick = [...unseenPick, ...extra];
  }

  // Ordre strict : d'abord les "à revoir", puis les "non vues"
  const bodyOrdered = [...reviewPick, ...unseenPick];
  // Déduplication par id en conservant l'ordre
  const seen = new Set();
  const body = bodyOrdered.filter(c => {
    if (seen.has(c.id)) return false;
    seen.add(c.id);
    return true;
  }).slice(0, 10);
  const bodyShortfall = 10 - body.length;
  const masteredExtra = shuffledMastered
    .filter(c => !warmup.includes(c))
    .slice(0, bodyShortfall);

  const deck = [...warmup, ...shuffle(reviewPick), ...shuffle(unseenPick), ...masteredExtra];

  if (deck.length === 0) {
    startSession(shuffle(mastered), 'Révision — tout maîtrisé');
  } else {
    startSession(deck, 'Révision flash');
  }
}

function modeRandom() {
  startSession(shuffle(availableCards()), 'Aléatoire');
}

function modeThemeFilter(themeKeys) {
  const set = new Set(themeKeys);
  const cards = availableCards().filter(c => set.has(c.theme));
  const label = themeKeys.length === 1
    ? THEMES[themeKeys[0]].label
    : themeKeys.length + ' thèmes';
  startSession(shuffle(cards), label);
}

function modeToReview() {
  const list = availableCards().filter(c => getCardStatus(c.id) === 'review');
  startSession(shuffle(list), 'À revoir uniquement');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

  switch (State.view) {

async function handleAuthSubmit(e) {
  e.preventDefault();
  const form = e.currentTarget;
  const submitBtn = form.querySelector('button[type="submit"]');
  const mode = submitBtn.dataset.mode;
  const email = (form.querySelector('#auth-email')?.value || '').trim().toLowerCase();
  const password = form.querySelector('#auth-password')?.value || '';

  if (!email) {
    State.authError = 'Merci de saisir ton email.';
    render('auth');
    return;
  }

  State.authError = null;
  State.authInfo = null;
  submitBtn.disabled = true;
  submitBtn.textContent = '…';

  try {
    if (mode === 'signup') {
      if (password.length < 6) {
        throw new Error('Le mot de passe doit faire au moins 6 caractères.');
      }
      await Backend.signUp(email, password);
      // Supabase a envoyé le mail de confirmation. On passe à l'écran "vérifie ton email".
      State.pendingEmail = email;
      State.authError = null;
      State.authInfo = null;
      render('verify');
    } else if (mode === 'signin') {
      await Backend.signIn(email, password);
      // Le onAuthStateChange va déclencher le chargement du profil.
      // On reste sur l'écran auth jusqu'à ce que l'init termine.
    } else if (mode === 'reset') {
      await Backend.resetPassword(email);
      State.authInfo = 'Si un compte existe pour cet email, un lien de réinitialisation vient d\'être envoyé. Vérifie ta boîte mail.';
      render('auth');
    }
  } catch (err) {
    console.warn('auth error', err);
    State.authError = humanizeAuthError(err);
    render('auth');
  }
}

function humanizeAuthError(err) {
  const msg = (err && err.message) ? err.message : String(err);
  const low = msg.toLowerCase();
  if (low.includes('invalid login credentials')) return 'Email ou mot de passe incorrect.';
  if (low.includes('user already registered')) return 'Un compte existe déjà pour cet email. Essaie de te connecter.';
  if (low.includes('email not confirmed')) return 'Tu dois d\'abord confirmer ton email. Vérifie ta boîte mail.';
  if (low.includes('password should be')) return 'Mot de passe trop court (6 caractères minimum).';
  if (low.includes('rate limit') || low.includes('email rate')) return 'Trop de tentatives. Attends quelques minutes avant de réessayer.';
  if (low.includes('network') || low.includes('fetch')) return 'Problème de connexion. Vérifie ton réseau.';
  return msg;
}

async function handleAuthenticated(session) {
  // Fonction appelée quand on détecte qu'un utilisateur est connecté
  State.user = {
    id: session.user.id,
    email: session.user.email
  };
  Cache.saveUser(State.user);

  // Charger le profil + progress depuis le cache d'abord (rapide)
  const cachedProfile = Cache.loadProfile();
  const cachedProgress = Cache.loadProgress();
  if (cachedProfile) State.profile = cachedProfile;
  if (cachedProgress) State.progress = cachedProgress;
  State.premiumAccess = Cache.loadPremiumAccess();

  // Charger la queue de sync restée en attente
  State.syncQueue = Cache.loadQueue();
  State.pendingWrites = State.syncQueue.length;

  // Si on a du cache, on peut déjà afficher le home
  if (State.profile) {
    render('home');
  }

  // Puis on tente de charger la version fraîche depuis le backend
  if (State.isOnline && supabase) {
    try {
      const profile = await Backend.loadProfile(State.user.id);
      State.profile = profile;
      Cache.saveProfile(profile);

      const progressRows = await Backend.loadProgress(State.user.id);
      const progress = {};
      for (const row of progressRows) {
        progress[row.card_id] = {
          status: row.status,
          seenCount: row.seen_count || 0,
          lastSeenAt: row.last_seen_at
        };
      }
      // Merge intelligent : on ne perd pas les modifs locales en attente de sync
      // Pour chaque carte dans la queue, on garde la version locale
      const queuedCards = new Set(
        State.syncQueue.filter(op => op.t === 'card').map(op => op.cardId)
      );
      for (const cardId of Object.keys(State.progress)) {
        if (queuedCards.has(cardId)) {
          progress[cardId] = State.progress[cardId];
        }
      }
      State.progress = progress;
      Cache.saveProgress(progress);

      // Charger les accès premium par UE (cache léger en localStorage)
      try {
        State.premiumAccess = await Backend.loadPremiumAccess(State.user.id);
        Cache.savePremiumAccess(State.premiumAccess);
      } catch (err) {
        console.warn('loadPremiumAccess failed, using cache', err);
        State.premiumAccess = Cache.loadPremiumAccess();
      }

      if (State.view === 'splash' || !cachedProfile) {
        render('home');
      } else {
        // Re-render si on était déjà sur home, pour montrer les nouvelles données
        if (State.view === 'home' || State.view === 'settings') {
          render();
        }
      }

      // Flusher la queue s'il y a des ops en attente
      if (State.syncQueue.length > 0) {
        SyncQueue.flush();
      }
    } catch (err) {
      console.warn('Initial load failed, using cache', err);
      if (!State.profile) {
        // Pas de cache ET backend injoignable : erreur
        document.getElementById('view').innerHTML = `
          <div class="empty-state" style="padding:60px 30px;">
            <h2>Connexion impossible</h2>
            <p>On n'arrive pas à joindre le serveur. Vérifie ta connexion et réessaie.</p>
            <button class="btn" id="retry">Réessayer</button>
          </div>`;
        document.getElementById('view').querySelector('#retry').addEventListener('click', () => {
          window.location.reload();
        });
      }
    }
  } else if (!State.profile) {
    // Hors-ligne et pas de cache : on bloque
    document.getElementById('view').innerHTML = `
      <div class="empty-state" style="padding:60px 30px;">
        <h2>Hors-ligne</h2>
        <p>Première utilisation nécessite une connexion Internet. Reconnecte-toi et relance l'app.</p>
      </div>`;
  }
}

function handleSignedOut() {
  State.user = null;
  State.profile = null;
  State.progress = {};
  State.syncQueue = [];
  State.pendingWrites = 0;
  State.session = null;
  Cache.clearAll();
  State.authMode = 'signin';
  State.authError = null;
  State.authInfo = null;

// ============================================================
// CHARGEMENT DES FLASHCARDS DEPUIS SUPABASE
// ============================================================
async function loadCards(tableName) {
  const table = tableName || (window.CFG.matieres[0] && window.CFG.matieres[0].table) || 'flashcards';
  // Préfixe utilisé pour namespacer card_progress.card_id entre les différentes UE
  // (ex: "ue1-42"). Sans ce préfixe, deux UE pourraient partager par erreur
  // la progression d'une carte ayant le même id numérique en base.
  const prefix = (State.matiere && State.matiere.id) || 'ue1';
  try {
    const { data, error } = await supabase
      .from(table)
      .select('*')
      .order('id', { ascending: true });

    if (error) throw error;

    // Convertir sessions (texte "mai-2025,nov-2017") → tableau JS
    CARDS = (data || []).map(row => ({
      id:      `${prefix}-${row.id}`,
      theme:   row.theme,
      q:       row.q,
      a:       row.a,
      detail:  row.detail  || '',
      source:  row.source  || '',
      isPremium: !!row.is_premium,
      sessions: row.sessions
        ? row.sessions.split(',').map(s => s.trim()).filter(Boolean)
        : [],
      carousel_page_1: row.carousel_page_1 || '',
      carousel_page_2: row.carousel_page_2 || '',
      carousel_page_3: row.carousel_page_3 || ''
    }));

    if (CARDS.length === 0) {
      console.warn(`loadCards: aucune carte retournée par Supabase pour la table "${table}".`);
    }

    // Construire THEMES à partir des valeurs distinctes de la colonne "theme"
    // des cartes elles-mêmes (le thème vient désormais du fichier de données,
    // plus de config.json). L'ordre d'apparition dans les données est conservé.
    THEMES = {};
    for (const c of CARDS) {
      const key = c.theme;
      if (key && !THEMES[key]) {
        THEMES[key] = { label: key };
      }
    }
  } catch (err) {
    console.error(`loadCards: erreur pour la table "${table}"`, err);
    // Fallback gracieux : CARDS reste vide, l'UI affichera un message
    CARDS = [];
  }
}

// Retourne la matière par son id, ou null
function findMatiere(id) {
  return (window.CFG.matieres || []).find(m => m.id === id) || null;
}

// Applique les éléments visuels (couleurs, kicker, titres) d'une matière
function applyMatiereVisuals(matiere) {
  if (!matiere) return;
  const root = document.documentElement;
  if (matiere.couleurs) {
    root.style.setProperty('--accent',      matiere.couleurs.accent      || window.CFG.accent);
    root.style.setProperty('--accent-soft', matiere.couleurs.accent_soft || window.CFG.accent_soft);
  }
  // Met à jour window.CFG pour que les écrans utilisent les bonnes valeurs
  window.CFG.kicker             = matiere.kicker             || window.CFG.kicker;
  window.CFG.kicker_long        = matiere.kicker_long        || window.CFG.kicker_long;
  window.CFG.titre_matiere_html = matiere.titre_matiere_html || window.CFG.titre_matiere_html;
  window.CFG.sous_titre_matiere = matiere.sous_titre_matiere || window.CFG.sous_titre_matiere;
  window.CFG.titre_court        = matiere.nom_court          || window.CFG.titre_court;

  // Le filtre par thème est réinitialisé au changement de matière, car
  // THEMES sera reconstruit à partir des nouvelles cartes chargées (voir loadCards)
  State.filter = null;

  // Titre de la page / icône app
  const titleEl = document.getElementById('page-title');
  const metaEl  = document.getElementById('meta-app-title');
  if (titleEl) titleEl.textContent = window.CFG.titre_court + ' — Flashcards';
  if (metaEl)  metaEl.setAttribute('content', window.CFG.titre_court);
}

// Change de matière : charge les cartes correspondantes, met à jour visuels, sauvegarde le choix
async function switchMatiere(matiereId) {
  const matiere = findMatiere(matiereId);
  if (!matiere) return;

  State.matiere = matiere;
  applyMatiereVisuals(matiere);

  try {
    localStorage.setItem(CACHE_MATIERE_KEY, matiereId);
  } catch (err) {
    console.warn('Impossible de sauvegarder la matière sélectionnée', err);
  }

  await loadCards(matiere.table);

  // Réinitialiser la session de révision en cours et les filtres,
  // car les cartes ont changé
  State.session = null;
  State.filter = null;
  State.cardFlipped = false;

  render('home');
}

// Récupère la matière sauvegardée en cache, ou la première de la liste par défaut
function getInitialMatiere() {
  try {
    const savedId = localStorage.getItem(CACHE_MATIERE_KEY);
    if (savedId) {
      const found = findMatiere(savedId);
      if (found) return found;
    }
  } catch (err) {
    // ignore
  }
  return (window.CFG.matieres && window.CFG.matieres[0]) || null;
}

  // Vérifier que Supabase s'est bien chargé
  if (!supabase) {
    document.getElementById('view').innerHTML = `
      <div class="empty-state" style="padding:60px 30px;">
        <h2>Erreur de chargement</h2>
        <p>La bibliothèque Supabase n'a pas pu être chargée. Vérifie ta connexion Internet et recharge la page.</p>
      </div>`;
    return;
  }

  // Vérifier localStorage
  try {
    localStorage.setItem('__t__', '1');
    localStorage.removeItem('__t__');
  } catch (err) {
    document.getElementById('view').innerHTML = `
      <div class="empty-state" style="padding:60px 30px;">
        <h2>Stockage indisponible</h2>
        <p>Cette app a besoin de localStorage (pour le cache offline). Si tu es en navigation privée, essaie en navigation normale.</p>
      </div>`;
    return;
  }

  // Déterminer la matière initiale (cache ou première de la liste), appliquer visuels
  State.matiere = getInitialMatiere();
  applyMatiereVisuals(State.matiere);

  // Charger les flashcards depuis Supabase avant tout
  await loadCards(State.matiere ? State.matiere.table : null);

  // Afficher l'écran de connexion / splash
  render('splash');

  // Écouter les changements d'état d'auth
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
      if (session && (!State.user || State.user.id !== session.user.id)) {
        await handleAuthenticated(session);
      }
    } else if (event === 'SIGNED_OUT') {
      handleSignedOut();
    } else if (event === 'USER_UPDATED') {
      // Changement de mot de passe, etc. — ne rien faire de spécial
    }
  });

  // Gérer le cas d'un lien de reset password (ou confirmation) dans l'URL
  // Supabase gère automatiquement detectSessionInUrl = true

  // Charger la session existante au démarrage
  const session = await Backend.getSession();
  if (session && session.user) {
    await handleAuthenticated(session);
  } else {
    State.authMode = 'signin';
    render('auth');
  }

  // Events réseau
  window.addEventListener('online', () => {
    State.isOnline = true;
    renderSyncIndicator();
    if (State.user) {
      SyncQueue.resetBackoff();
      SyncQueue.flush();
    }
  });
  window.addEventListener('offline', () => {
    State.isOnline = false;
    renderSyncIndicator();
  });

  // Flush périodique en cas de visibility change (retour sur l'app)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && State.user && State.isOnline) {
      SyncQueue.resetBackoff();
      SyncQueue.flush();
    }
  });
}

// Démarre après chargement du DOM (au cas où, bien que le script soit en fin de body)
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

function renderCard(root) {
  const sess = State.session;
  if (!sess || !sess.cards || sess.cards.length === 0) {
    root.innerHTML = `
      <div class="topbar">
        <button class="icon-btn" id="back-home" aria-label="Retour">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>

        <p>Ta sélection ne contient aucune carte. Essaie une autre combinaison de thèmes.</p>
        <button class="btn secondary" id="back-home-btn">Retour au menu</button>
      </div>
    `;
    root.querySelector('#back-home').addEventListener('click', () => render('home'));
    root.querySelector('#back-home-btn').addEventListener('click', () => render('home'));
    return;
  }

  if (sess.index >= sess.cards.length) {
    renderEnd(root);
    return;
  }

  const card = sess.cards[sess.index];
  const theme = THEMES[card.theme];
  const status = getCardStatus(card.id);
  const pct = Math.round(((sess.index) / sess.cards.length) * 100);

  const statusBadge = status === 'mastered'
    ? '<div class="card-state-badge mastered">Maîtrisée</div>'
    : (status === 'review' ? '<div class="card-state-badge review">À revoir</div>' : '');

  const detailHtml = card.detail ? `
    <button class="fc-detail-toggle" id="detail-toggle" type="button">
      ${State.lastDetailOpen ? '− Masquer les compléments' : '+ Compléments'}
    </button>
    ${State.lastDetailOpen ? `<div class="fc-detail">${escapeHtml(card.detail)}</div>` : ''}
  ` : '';

  root.innerHTML = `
    <div class="screen-card">
      <div class="card-topbar">
        <button class="icon-btn" id="back-home" aria-label="Retour">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        ${sess.index > 0 ? `
        <button class="icon-btn" id="btn-prev-card" aria-label="Carte précédente" title="Carte précédente">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        ` : ''}
        <div class="card-counter">
          <span>${escapeHtml(sess.label)}</span>
          <span class="sep">·</span>
          <span>${sess.index + 1} <span class="sep">/</span> ${sess.cards.length}</span>
        </div>
        <button class="icon-btn" id="btn-skip-top" aria-label="Passer">
          <svg viewBox="0 0 24 24"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
        </button>
      </div>
      <div class="card-progressbar"><span style="width:${pct}%"></span></div>

      <div class="card-stage">
        <div class="flashcard ${State.cardFlipped ? 'flipped' : ''}" id="flashcard" role="button" tabindex="0" aria-label="Cliquer pour retourner la carte">

          <div class="flashcard-face front">
            ${statusBadge}
            <div class="fc-head">
              <div class="fc-theme">
                ${escapeHtml(theme.label)}
              </div>
              <div class="fc-id">${escapeHtml(card.id)}</div>
            </div>
            <div class="fc-question">${escapeHtml(card.q)}</div>
            <div class="fc-footer-front">Tap pour voir la réponse</div>
          </div>

          <div class="flashcard-face back">
            <div class="fc-head">
              <div class="fc-theme">
                ${escapeHtml(theme.label)}
              </div>
              <div class="fc-id">${escapeHtml(card.id)}</div>
            </div>
            <div class="fc-answer">${escapeHtml(card.a)}</div>
            ${detailHtml}
            ${card.source ? `<div class="fc-source">${escapeHtml(card.source)}</div>` : ''}
          </div>

        </div>
      </div>

      <div class="card-actions">
        <button class="card-action review" id="btn-review">↺ À revoir</button>
        <button class="card-action mastered" id="btn-mastered">✓ Maîtrisée</button>
        <button class="card-action skip full" id="btn-skip">Passer sans décider →</button>
      </div>
    </div>
  `;

  const fc = root.querySelector('#flashcard');
  const flip = () => {
    State.cardFlipped = !State.cardFlipped;
    fc.classList.toggle('flipped');
  };

  fc.addEventListener('click', e => {
    if (e.target.closest('.fc-detail-toggle')) return;
    flip();
  });
  fc.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      flip();
    }
  });

  const dt = root.querySelector('#detail-toggle');
  if (dt) {
    dt.addEventListener('click', e => {
      e.stopPropagation();
      State.lastDetailOpen = !State.lastDetailOpen;
      render('card');
    });
  }

  // Swipe
  let touchStartX = 0, touchStartY = 0, touchStartT = 0;
  const stage = root.querySelector('.card-stage');
  stage.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartT = Date.now();
  }, { passive: true });
  stage.addEventListener('touchend', e => {
    if (!touchStartT) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const dtMs = Date.now() - touchStartT;
    touchStartT = 0;
    if (Math.abs(dx) > 60 && Math.abs(dy) < 50 && dtMs < 500) {
      if (dx < 0) nextCard();
      else previousCard();
    }
  }, { passive: true });

  root.querySelector('#btn-review').addEventListener('click', () => {
    markCardSeen(card.id);
    setCardStatus(card.id, 'review');
    nextCard();
  });
  root.querySelector('#btn-mastered').addEventListener('click', () => {
    markCardSeen(card.id);
    setCardStatus(card.id, 'mastered');
    nextCard();
  });
  root.querySelector('#btn-skip').addEventListener('click', () => {
    markCardSeen(card.id);
    nextCard();
  });
  root.querySelector('#btn-skip-top').addEventListener('click', () => {
    markCardSeen(card.id);
    nextCard();
  });
  const prevBtn = root.querySelector('#btn-prev-card');
  if (prevBtn) {
    prevBtn.addEventListener('click', () => previousCard());
  }
  root.querySelector('#back-home').addEventListener('click', () => {
    State.session = null;
    render('home');
  });
}

function nextCard() {
  if (!State.session) return;
  State.session.index += 1;
  State.cardFlipped = false;
  State.lastDetailOpen = false;
  render('card');
}
function previousCard() {
  if (!State.session) return;
  if (State.session.index > 0) {
    State.session.index -= 1;
    State.cardFlipped = false;
    State.lastDetailOpen = false;
    render('card');
  }
}

// Calcule l'offre pertinente à afficher à l'utilisateur :
// - le nombre d'UE déjà débloquées (premiumAccess)
// - si l'UE actuelle est déjà débloquée ou non
// - le prix du palier correspondant si on ajoute l'UE actuelle
// - le prix du pack complet, et s'il devient plus avantageux
function getPremiumOffer() {
  const paliers = window.CFG.premium_paliers;       // { "1": 4.99, "2": 8.99, "3": 12.99 }
  const pack    = window.CFG.premium_pack;          // { nb_ue: 7, prix: 24.99 }
  const devise  = window.CFG.premium_devise;

  const unlockedCount = State.premiumAccess.size;
  const currentUnlocked = isCurrentMatierePremium();
  // Nombre d'UE qu'on aurait après avoir débloqué l'UE actuelle (si pas déjà débloquée)
  const nextCount = currentUnlocked ? unlockedCount : unlockedCount + 1;

  // Au-delà du palier "3", on reste au prix du dernier palier connu par UE
  // supplémentaire (le pack complet devient alors l'option recommandée).
  const maxPalier = Math.max(...Object.keys(paliers).map(Number));
  const palierKey = String(Math.min(nextCount, maxPalier));
  const prixPalier = paliers[palierKey];

  const formatPrix = n => n.toFixed(2).replace('.', ',') + ' ' + devise;

  return {
    unlockedCount,
    currentUnlocked,
    nextCount,
    prixPalier,
    prixPalierFormatted: formatPrix(prixPalier),
    prixPack: pack.prix,
    prixPackFormatted: formatPrix(pack.prix),
    nbUeTotal: pack.nb_ue,
    // Le pack complet devient intéressant à mettre en avant dès qu'on
    // approche de son prix en achetant à l'unité
    packRecommande: nextCount >= maxPalier
  };
}

      <div class="settings-list">

        </button>

          <div class="s-label">Réinitialiser ma progression</div>
          <div class="s-meta">${seen > 0 ? seen + ' cartes' : ''}</div>
        </button>
        <button class="settings-row" id="s-honest">
          <div class="s-label">Revoir le message d'accueil</div>
        </button>
        <button class="settings-row danger" id="s-signout">
          <div class="s-label">Se déconnecter</div>
        </button>
      </div>

      <div style="padding: 32px 24px; color: var(--ink-mute); font-size: 12px; line-height: 1.6;">
        <div class="kicker" style="margin-bottom: 10px;">À propos</div>
        ${window.CFG.description_a_propos}
        <div style="height: 14px"></div>
        Synchronisation entre appareils via compte email + mot de passe. Les données ne servent qu'à ton usage et ne sont transmises à personne.
        <div style="margin-top: 22px; padding-top: 14px; border-top: 1px dotted var(--rule); letter-spacing: 0.04em;">
          © ${window.CFG.nom_societe} by ${window.CFG.auteur}, ${window.CFG.annee}<br>
          <a href="mailto:${window.CFG.email}" style="color: var(--ink-mute); text-decoration: underline; text-underline-offset: 2px;">${window.CFG.email}</a><br>
          <a href="https://${window.CFG.site_web}" target="_blank" rel="noopener" style="color: var(--ink-mute); text-decoration: underline; text-underline-offset: 2px;">${window.CFG.site_web}</a>
        </div>
      </div>
    </div>
  `;

  root.querySelector('#back-home').addEventListener('click', () => render('home'));

  root.querySelector('#s-pseudo').addEventListener('click', async () => {
    const np = prompt('Nouveau pseudo ?', pseudo);
    if (!np) return;
    const cleaned = np.trim().slice(0, 24);
    if (!cleaned || cleaned === pseudo) return;
    State.profile.pseudo = cleaned;
    Cache.saveProfile(State.profile);
    SyncQueue.enqueueProfile();
    toast('Pseudo mis à jour.');
    render('settings');
  });

  root.querySelector('#s-password').addEventListener('click', async () => {
    const np = prompt('Nouveau mot de passe (6 caractères minimum) :');
    if (!np) return;
    if (np.length < 6) {
      toast('Mot de passe trop court.');
      return;
    }
    try {
      await Backend.updatePassword(np);
      toast('Mot de passe changé.');
    } catch (err) {
      toast('Erreur : ' + humanizeAuthError(err));
    }
  });

  root.querySelector('#s-reset').addEventListener('click', async () => {
    if (!confirm('Réinitialiser toute ta progression ? Cette action est irréversible.')) return;

    // Feedback visuel immédiat : on montre que ça tourne
    toast('Réinitialisation en cours…');

    try {
      // Si une sync est en cours, on lui laisse au max 3s pour finir
      // (elle prendra le verrou d'auth et empêcherait nos appels sinon).
      if (State.syncInProgress) {
        await Promise.race([
          (async () => {
            while (State.syncInProgress) {
              await new Promise(r => setTimeout(r, 100));
            }
          })(),
          new Promise(r => setTimeout(r, 3000))
        ]);
      }

      if (State.user && State.isOnline) {
        await Backend.deleteAllProgress(State.user.id);
      }
      State.progress = {};
      State.profile.total_seen = 0;
      State.profile.streak_current = 0;
      State.profile.streak_longest = 0;
      State.profile.streak_last_day = null;
      State.profile.milestones_reached = [];
      Cache.saveProgress({});
      Cache.saveProfile(State.profile);
      // Vider la queue de sync des anciennes ops cartes
      State.syncQueue = State.syncQueue.filter(op => op.t !== 'card');
      Cache.saveQueue(State.syncQueue);
      State.pendingWrites = State.syncQueue.length;
      SyncQueue.enqueueProfile();
      toast('Progression réinitialisée.');
      render('home');
    } catch (err) {
      toast('Erreur : impossible de réinitialiser. Réessaie.');
      console.error(err);
    }
  });

  root.querySelector('#s-honest').addEventListener('click', () => {
    State.profile.honest_note_shown = false;
    Cache.saveProfile(State.profile);
    SyncQueue.enqueueProfile();
    render('home');
  });

  root.querySelector('#s-signout').addEventListener('click', async () => {
    if (!confirm('Se déconnecter ? Ta progression reste enregistrée dans ton compte.')) return;

    // Déconnexion "locale" immédiate : on n'attend pas la réponse du serveur.
    // Cela évite que l'utilisateur reste bloqué si une sync est en cours ou
    // si le réseau traîne.
    // Backend.signOut() est lancé en arrière-plan pour nettoyer la session
    // côté serveur, mais son résultat n'affecte pas l'UX.
    try { Backend.signOut().catch(() => {}); } catch (e) {}
    handleSignedOut();
  });
}
