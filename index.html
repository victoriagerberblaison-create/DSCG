function openThemesModal() {
  if (!State.filter) State.filter = new Set(Object.keys(THEMES));

  const body = document.getElementById('themes-body');
  const entries = Object.entries(THEMES);
  body.innerHTML = `
    <div class="modal-part">
      ${entries.map(([key, t]) => {
        const s = themeStats(key);
        const checked = State.filter.has(key);
        return `
          <button type="button" class="theme-check ${checked ? 'checked' : ''}" data-theme="${key}">
            <div class="checkbox">
              <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
            </div>
            <div class="body">
              <div class="name">${escapeHtml(t.label)}</div>
              <div class="meta">${s.mastered}/${s.total} · ${s.total ? Math.round(s.mastered/s.total*100) : 0}% maîtrisé</div>
            </div>
          </button>
        `;
      }).join('')}
    </div>
  `;

  body.querySelectorAll('.theme-check').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.theme;
      if (State.filter.has(key)) {
        State.filter.delete(key);
        el.classList.remove('checked');
      } else {
        State.filter.add(key);
        el.classList.add('checked');
      }
      updateToggleAllLabel();
    });
  });

  updateToggleAllLabel();

  const modal = document.getElementById('modal-themes');
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}

function updateToggleAllLabel() {
  const btn = document.getElementById('themes-toggle-all');

  const allSelected = State.filter.size === Object.keys(THEMES).length;
  btn.textContent = allSelected ? 'Tout désélect.' : 'Tout sélect.';
}

function closeThemesModal() {
  const modal = document.getElementById('modal-themes');

// Init modal events
document.getElementById('themes-toggle-all').addEventListener('click', () => {
  if (State.filter && State.filter.size === Object.keys(THEMES).length) {
    State.filter.clear();
  } else {
    State.filter = new Set(Object.keys(THEMES));
  }
  openThemesModal();
});

document.getElementById('themes-apply').addEventListener('click', () => {
  if (!State.filter || State.filter.size === 0) {
    toast('Sélectionne au moins un thème.', 'info');
    return;
  }
  closeThemesModal();
  modeThemeFilter(Array.from(State.filter));
});

document.getElementById('modal-themes').addEventListener('click', e => {
  if (e.target.id === 'modal-themes') closeThemesModal();
});

// ============================================================
// KEYBOARD SHORTCUTS (desktop)
// ============================================================

document.addEventListener('keydown', e => {
  if (State.view !== 'card' || !State.session) return;
  if (State.session.index >= State.session.cards.length) return;
  if (e.target.tagName === 'INPUT') return;

  const card = State.session.cards[State.session.index];
  if (e.key === ' ') {
    e.preventDefault();
    State.cardFlipped = !State.cardFlipped;
    const fc = document.getElementById('flashcard');
    if (fc) fc.classList.toggle('flipped');
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    markCardSeen(card.id);
    nextCard();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    previousCard();
  } else if (e.key === 'm' || e.key === 'M') {
    e.preventDefault();
    markCardSeen(card.id);
    setCardStatus(card.id, 'mastered');
    nextCard();
  } else if (e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    markCardSeen(card.id);
    setCardStatus(card.id, 'review');
    nextCard();
  }
});


  // =============================================================
  // CARROUSEL INFO DU JOUR
  // =============================================================

  function showDailyCarousel() {
    var carouselCards = CARDS.filter(function(c) {
      return c.carousel_page_1 && c.carousel_page_1.trim();
    });
    if (!carouselCards.length) return;

    var today = new Date().toISOString().slice(0, 10);
    var storageKey = 'carousel_dismissed_' + today;
    if (localStorage.getItem(storageKey)) return;

    var now = new Date();
    var start = new Date(now.getFullYear(), 0, 0);
    var dayOfYear = Math.floor((now - start) / 86400000);
    var card = carouselCards[dayOfYear % carouselCards.length];
    var pages = [card.carousel_page_1, card.carousel_page_2, card.carousel_page_3];
    var currentSlide = 0;

    function fmt(raw) {
      if (!raw) return '';
      return raw.split('\n\n')
        .map(function(p) { return p.trim(); })
        .filter(function(p) { return p.length > 0; })
        .map(function(p) {
          return '<span class="carousel-p">' +
            p.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;}).join('<br>') +
            '</span>';
        }).join('');
    }

    var track    = document.getElementById('carousel-track');
    var dotsEl   = document.getElementById('carousel-dots');
    var nextBtn  = document.getElementById('carousel-next-btn');
    var skipBtn  = document.getElementById('carousel-skip-btn');
    var closeBtn = document.getElementById('carousel-close-btn');
    var overlay  = document.getElementById('carousel-overlay');

    track.innerHTML = pages.map(function(t) {
      return '<div class="carousel-slide"><div class="carousel-slide-text">' + fmt(t) + '</div></div>';
    }).join('');

    dotsEl.innerHTML = pages.map(function(_, i) {
      return '<span class="carousel-dot' + (i===0?' active':'') + '" data-i="' + i + '"></span>';
    }).join('');

    function goTo(i) {
      currentSlide = i;
      track.style.transform = 'translateX(-' + (i*100) + '%)';
      dotsEl.querySelectorAll('.carousel-dot').forEach(function(d,j){ d.classList.toggle('active', j===i); });
      nextBtn.textContent = (i===pages.length-1) ? 'Fermer \u2713' : 'Suivant \u2192';
    }

    function dismiss() {
      overlay.classList.remove('visible');
      localStorage.setItem(storageKey, '1');
    }

    nextBtn.onclick  = function() { currentSlide < pages.length-1 ? goTo(currentSlide+1) : dismiss(); };
    skipBtn.onclick  = dismiss;
    closeBtn.onclick = dismiss;
    overlay.addEventListener('click', function(e) { if (e.target===overlay) dismiss(); });
    dotsEl.querySelectorAll('.carousel-dot').forEach(function(dot) {
      dot.onclick = function() { goTo(parseInt(dot.dataset.i, 10)); };
    });

    var tx = 0;
    var wrapper = document.querySelector('.carousel-track-wrapper');
    wrapper.addEventListener('touchstart', function(e){ tx=e.changedTouches[0].clientX; }, {passive:true});
    wrapper.addEventListener('touchend',   function(e){
      var d=e.changedTouches[0].clientX-tx;
      if (d<-50 && currentSlide<pages.length-1) goTo(currentSlide+1);
      else if (d>50 && currentSlide>0) goTo(currentSlide-1);
    }, {passive:true});

    requestAnimationFrame(function(){ overlay.classList.add('visible'); });
  }


})();

</script>
